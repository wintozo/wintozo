name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Capacitor project
      run: |
        npx @capacitor/cli@latest init wintozo org.wintozo.messenger --web-dir=dist
        npx @capacitor/cli@latest add android

    - name: Configure Android app
      run: |
        # Обновляем AndroidManifest.xml - имя приложения и разрешения
        sed -i 's/android:label="[^"]*"/android:label="Messenger Wintozo"/g' android/app/src/main/AndroidManifest.xml
        sed -i 's/<application/<application\n    android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
        
        # Добавляем разрешения на микрофон
        sed -i '/<\/manifest>/i <uses-permission android:name="android.permission.RECORD_AUDIO" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<\/manifest>/i <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<\/manifest>/i <uses-permission android:name="android.permission.RECORD_AUDIO" android:maxSdkVersion="33" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<\/manifest>/i <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' android/app/src/main/AndroidManifest.xml
        sed -i '/<\/manifest>/i <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MICROPHONE" />' android/app/src/main/AndroidManifest.xml
        
        # Обновляем build.gradle
        sed -i 's/applicationId "org.wintozo.app"/applicationId "org.wintozo.messenger"/g' android/app/build.gradle
        
        # Копируем логотип во все разрешения (иконка и круглая иконка)
        mkdir -p android/app/src/main/res/mipmap-hdpi
        mkdir -p android/app/src/main/res/mipmap-mdpi
        mkdir -p android/app/src/main/res/mipmap-xhdpi
        mkdir -p android/app/src/main/res/mipmap-xxhdpi
        mkdir -p android/app/src/main/res/mipmap-xxxhdpi
        
        cp src/public/logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher.png
        cp src/public/logo.png android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        cp src/public/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher.png
        cp src/public/logo.png android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        cp src/public/logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher.png
        cp src/public/logo.png android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        cp src/public/logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        cp src/public/logo.png android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        cp src/public/logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        cp src/public/logo.png android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Messenger-Wintozo-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
