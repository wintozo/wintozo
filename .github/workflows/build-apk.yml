name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Create Capacitor project
      run: |
        npx @capacitor/cli@latest init wintozo org.wintozo.messenger --web-dir=dist
        npx @capacitor/cli@latest add android

    - name: Configure Android manifest
      run: |
        sed -i 's/label="Wintozo"/label="Messenger Wintozo"/g' android/app/src/main/AndroidManifest.xml
        sed -i 's/label="App"/label="Messenger Wintozo"/g' android/app/src/main/AndroidManifest.xml

    - name: Copy logo
      run: |
        mkdir -p android/app/src/main/res/mipmap-*
        for dir in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
          cp src/public/logo.png "android/app/src/main/res/mipmap-$dir/"
        done

    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Messenger-Wintozo-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
